<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Future — NephroAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-cyan: #06b6d4;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #020617;
            color: #f1f5f9;
        }
        .glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(12px); 
            border: 1px solid var(--glass-border);
        }
        .hero-bg {
            background: radial-gradient(circle at 50% -20%, rgba(59, 130, 246, 0.15), transparent 70%),
                        radial-gradient(circle at 0% 100%, rgba(6, 182, 212, 0.1), transparent 50%);
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }
        select option {
            background: #0f172a;
            color: white;
        }
    </style>
</head>
<body class="hero-bg min-h-screen flex flex-col items-center justify-center p-6 py-20 selection:bg-cyan-500/30">

    <div class="fixed top-8 left-8">
        <a href="/" class="text-2xl font-black text-white flex items-center gap-2 tracking-tighter hover:scale-105 transition-transform">
            <i class="fas fa-heart-pulse text-cyan-400"></i> Nephro<span class="text-cyan-400">AI</span>
        </a>
    </div>

    <div class="w-full max-w-3xl glass p-10 rounded-[2.5rem] shadow-2xl border border-white/10 neon-border relative overflow-hidden">
        <!-- Glow Effect -->
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-cyan-500/10 rounded-full blur-3xl"></div>
        
        <div class="text-center mb-10 relative z-10">
            <h1 class="text-4xl font-black text-white mb-2 tracking-tight">Create Profile</h1>
            <p class="text-slate-400 font-semibold text-sm">Join the next generation of kidney care</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="mb-6 p-4 rounded-2xl {% if category == 'error' %}bg-rose-500/10 text-rose-400 border border-rose-500/20{% else %}bg-cyan-500/10 text-cyan-400 border border-cyan-500/20{% endif %} font-bold text-xs text-center uppercase tracking-widest">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="/register" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-10">
            <!-- Full Name -->
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-cyan-500/70 ml-1">Full Name</label>
                <div class="relative">
                    <input type="text" name="name" placeholder="John Doe" required
                           class="w-full px-4 py-4 rounded-2xl bg-white/5 border border-white/10 focus:outline-none focus:ring-2 focus:ring-cyan-500/30 focus:bg-white/10 focus:border-cyan-500/50 transition-all font-semibold text-white placeholder:text-slate-600">
                </div>
            </div>

            <!-- Email -->
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-cyan-500/70 ml-1">Secure Email</label>
                <div class="relative">
                    <input type="email" name="email" placeholder="name@NephroAI.ai" required
                           class="w-full px-4 py-4 rounded-2xl bg-white/5 border border-white/10 focus:outline-none focus:ring-2 focus:ring-cyan-500/30 focus:bg-white/10 focus:border-cyan-500/50 transition-all font-semibold text-white placeholder:text-slate-600">
                </div>
            </div>

            <!-- Password -->
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-cyan-500/70 ml-1">Access Key</label>
                <div class="relative">
                    <input type="password" name="password" placeholder="••••••••" required
                           class="w-full px-4 py-4 rounded-2xl bg-white/5 border border-white/10 focus:outline-none focus:ring-2 focus:ring-cyan-500/30 focus:bg-white/10 focus:border-cyan-500/50 transition-all font-semibold text-white placeholder:text-slate-600">
                </div>
            </div>

            <!-- Age -->
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-cyan-500/70 ml-1">Age (Years)</label>
                <div class="relative">
                    <input type="number" name="age" placeholder="45" required
                           class="w-full px-4 py-4 rounded-2xl bg-white/5 border border-white/10 focus:outline-none focus:ring-2 focus:ring-cyan-500/30 focus:bg-white/10 focus:border-cyan-500/50 transition-all font-semibold text-white placeholder:text-slate-600">
                </div>
            </div>

            <!-- Dialysis Type -->
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-cyan-500/70 ml-1">Dialysis Mode</label>
                <select name="dialysis_type" class="w-full px-4 py-4 rounded-2xl bg-white/5 border border-white/10 focus:outline-none focus:ring-2 focus:ring-cyan-500/30 focus:bg-white/10 focus:border-cyan-500/50 transition-all font-semibold text-white appearance-none cursor-pointer">
                    <option value="Hemodialysis">Hemodialysis</option>
                    <option value="Peritoneal Dialysis">Peritoneal Dialysis</option>
                    <option value="Not on Dialysis">Not on Dialysis</option>
                </select>
            </div>

            <!-- CKD Stage -->
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-cyan-500/70 ml-1">Clinical Stage</label>
                <select name="ckd_stage" class="w-full px-4 py-4 rounded-2xl bg-white/5 border border-white/10 focus:outline-none focus:ring-2 focus:ring-cyan-500/30 focus:bg-white/10 focus:border-cyan-500/50 transition-all font-semibold text-white appearance-none cursor-pointer">
                    <option value="Stage 1">Stage 1</option>
                    <option value="Stage 2">Stage 2</option>
                    <option value="Stage 3">Stage 3</option>
                    <option value="Stage 4">Stage 4</option>
                    <option value="Stage 5">Stage 5 (ESRD)</option>
                </select>
            </div>

            <button type="submit" class="md:col-span-2 py-4 bg-cyan-500 hover:bg-cyan-400 text-slate-950 rounded-2xl font-black shadow-[0_0_20px_rgba(6,182,212,0.3)] hover:scale-[1.01] active:scale-95 transition-all uppercase tracking-widest text-sm mt-4">
                Initialize Account
            </button>
        </form>

        <p class="mt-8 text-center text-xs font-bold text-slate-500 uppercase tracking-widest relative z-10">
            Already Registered? <a href="/login" class="text-cyan-400 hover:text-cyan-300 transition-colors">Sign In</a>
        </p>
    </div>

</body>
</html>
