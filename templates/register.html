<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Profile — NephroAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-light: #f8fafc;
            --blue-primary: #2563eb;
            --blue-secondary: #1e40af;
            --glass-white: rgba(255, 255, 255, 0.85);
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-light);
            color: #1e3a8a;
        }
        .glass { 
            background: var(--glass-white); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(37, 99, 235, 0.1);
        }
        .hero-bg {
            background: radial-gradient(circle at 50% -20%, rgba(37, 99, 235, 0.08), transparent 70%),
                        radial-gradient(circle at 0% 100%, rgba(30, 64, 175, 0.05), transparent 50%);
        }
        select option { color: #1e3a8a; }
    </style>
</head>
<body class="hero-bg min-h-screen flex flex-col items-center justify-center p-6 py-20">

    <div class="fixed top-12 left-12">
        <a href="/" class="text-2xl font-black text-blue-900 flex items-center gap-2 tracking-tighter hover:scale-105 transition-transform">
            <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white shadow-lg shadow-blue-500/20">
                <i class="fas fa-heartbeat"></i>
            </div>
            Nephro<span class="text-blue-600">AI</span>
        </a>
    </div>

    <div class="w-full max-w-3xl glass p-12 rounded-[48px] border border-blue-500/10 shadow-2xl shadow-blue-500/5 relative overflow-hidden">
        
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-blue-900 mb-3 tracking-tighter">Initialize Profile</h1>
            <p class="text-blue-400 font-black uppercase tracking-widest text-[10px]">Secure Clinical Registration</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="mb-8 p-4 rounded-2xl {% if category == 'error' %}bg-rose-50 text-rose-500 border border-rose-100{% else %}bg-blue-50 text-blue-600 border border-blue-100{% endif %} font-black text-[10px] text-center uppercase tracking-widest">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="/register" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-3">
                <label class="text-[11px] font-black uppercase tracking-[0.2em] text-blue-400 ml-2">Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required
                       class="w-full px-6 py-5 rounded-2xl glass border border-blue-100 focus:outline-none focus:ring-4 focus:ring-blue-500/5 focus:bg-white transition-all font-bold text-blue-900 placeholder:text-blue-200">
            </div>

            <div class="space-y-3">
                <label class="text-[11px] font-black uppercase tracking-[0.2em] text-blue-400 ml-2">Secure Email</label>
                <input type="email" name="email" placeholder="name@medical.ai" required
                       class="w-full px-6 py-5 rounded-2xl glass border border-blue-100 focus:outline-none focus:ring-4 focus:ring-blue-500/5 focus:bg-white transition-all font-bold text-blue-900 placeholder:text-blue-200">
            </div>

            <div class="space-y-3">
                <label class="text-[11px] font-black uppercase tracking-[0.2em] text-blue-400 ml-2">Initial PIN</label>
                <input type="password" name="password" placeholder="••••••••" required
                       class="w-full px-6 py-5 rounded-2xl glass border border-blue-100 focus:outline-none focus:ring-4 focus:ring-blue-500/5 focus:bg-white transition-all font-bold text-blue-900 placeholder:text-blue-200">
            </div>

            <div class="space-y-3">
                <label class="text-[11px] font-black uppercase tracking-[0.2em] text-blue-400 ml-2">Age</label>
                <input type="number" name="age" placeholder="45" required
                       class="w-full px-6 py-5 rounded-2xl glass border border-blue-100 focus:outline-none focus:ring-4 focus:ring-blue-500/5 focus:bg-white transition-all font-bold text-blue-900 placeholder:text-blue-200">
            </div>

            <div class="space-y-3">
                <label class="text-[11px] font-black uppercase tracking-[0.2em] text-blue-400 ml-2">Dialysis Mode</label>
                <select name="dialysis_type" class="w-full px-6 py-5 rounded-2xl glass border border-blue-100 focus:outline-none focus:ring-4 focus:ring-blue-500/5 focus:bg-white transition-all font-bold text-blue-900 appearance-none cursor-pointer">
                    <option value="Hemodialysis">Hemodialysis</option>
                    <option value="Peritoneal Dialysis">Peritoneal Dialysis</option>
                    <option value="Not on Dialysis">Not on Dialysis</option>
                </select>
            </div>

            <div class="space-y-3">
                <label class="text-[11px] font-black uppercase tracking-[0.2em] text-blue-400 ml-2">Clinical Stage</label>
                <select name="ckd_stage" class="w-full px-6 py-5 rounded-2xl glass border border-blue-100 focus:outline-none focus:ring-4 focus:ring-blue-500/5 focus:bg-white transition-all font-bold text-blue-900 appearance-none cursor-pointer">
                    <option value="Stage 1">Stage 1</option>
                    <option value="Stage 2">Stage 2</option>
                    <option value="Stage 3">Stage 3</option>
                    <option value="Stage 4">Stage 4</option>
                    <option value="Stage 5">Stage 5 (ESRD)</option>
                </select>
            </div>

            <button type="submit" class="md:col-span-2 py-5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-2xl font-black shadow-xl shadow-blue-500/20 hover:scale-[1.01] active:scale-95 transition-all uppercase tracking-widest text-xs mt-4">
                Initialize Secure Account
            </button>
        </form>

        <p class="mt-10 text-center text-[10px] font-black text-blue-300 uppercase tracking-widest leading-loose">
            Already Registered? <a href="/login" class="text-blue-600 hover:text-blue-800 underline decoration-blue-200">Sign In</a>
        </p>
    </div>

</body>
</html>
