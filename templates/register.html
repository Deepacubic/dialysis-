<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DialyCare AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-blue-50/50 min-h-screen flex flex-col items-center justify-center p-6 py-12">

    <div class="fixed top-8 left-8">
        <a href="/" class="text-2xl font-bold text-blue-600 flex items-center gap-2">
            <i class="fas fa-heart-pulse"></i> DialyCare AI
        </a>
    </div>

    <div class="w-full max-w-2xl bg-white p-10 rounded-[2.5rem] shadow-xl shadow-blue-100/50 border border-blue-50">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-slate-800 mb-2">Create Account</h1>
            <p class="text-slate-400 font-medium">Join our advanced kidney care platform</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="mb-6 p-4 rounded-2xl {% if category == 'error' %}bg-red-50 text-red-600{% else %}bg-blue-50 text-blue-600{% endif %} font-bold text-sm text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="/register" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Full Name -->
            <div class="space-y-2">
                <label class="text-xs font-black uppercase tracking-widest text-slate-400 ml-1">Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required
                       class="w-full px-4 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:bg-white transition-all font-semibold">
            </div>

            <!-- Email -->
            <div class="space-y-2">
                <label class="text-xs font-black uppercase tracking-widest text-slate-400 ml-1">Email Address</label>
                <input type="email" name="email" placeholder="name@example.com" required
                       class="w-full px-4 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:bg-white transition-all font-semibold">
            </div>

            <!-- Password -->
            <div class="space-y-2">
                <label class="text-xs font-black uppercase tracking-widest text-slate-400 ml-1">Password</label>
                <input type="password" name="password" placeholder="••••••••" required
                       class="w-full px-4 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:bg-white transition-all font-semibold">
            </div>

            <!-- Age -->
            <div class="space-y-2">
                <label class="text-xs font-black uppercase tracking-widest text-slate-400 ml-1">Age</label>
                <input type="number" name="age" placeholder="45" required
                       class="w-full px-4 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:bg-white transition-all font-semibold">
            </div>

            <!-- Dialysis Type -->
            <div class="space-y-2">
                <label class="text-xs font-black uppercase tracking-widest text-slate-400 ml-1">Dialysis Type</label>
                <select name="dialysis_type" class="w-full px-4 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:bg-white transition-all font-semibold">
                    <option value="Hemodialysis">Hemodialysis</option>
                    <option value="Peritoneal Dialysis">Peritoneal Dialysis</option>
                    <option value="Not on Dialysis">Not on Dialysis</option>
                </select>
            </div>

            <!-- CKD Stage -->
            <div class="space-y-2">
                <label class="text-xs font-black uppercase tracking-widest text-slate-400 ml-1">CKD Stage</label>
                <select name="ckd_stage" class="w-full px-4 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:bg-white transition-all font-semibold">
                    <option value="Stage 1">Stage 1</option>
                    <option value="Stage 2">Stage 2</option>
                    <option value="Stage 3">Stage 3</option>
                    <option value="Stage 4">Stage 4</option>
                    <option value="Stage 5">Stage 5 (ESRD)</option>
                </select>
            </div>

            <button type="submit" class="md:col-span-2 py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg shadow-blue-200 hover:scale-[1.01] active:scale-95 transition-all uppercase tracking-widest mt-4">
                Register Account
            </button>
        </form>

        <p class="mt-8 text-center text-sm font-bold text-slate-400">
            Already have an account? <a href="/login" class="text-blue-600 hover:underline">Sign in</a>
        </p>
    </div>

</body>
</html>
