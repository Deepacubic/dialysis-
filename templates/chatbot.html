<!-- DialyBot Floating Chat Widget -->
<div id="dialybot-container" class="dialybot-container">
    <div class="dialybot-header" onclick="toggleChat()">
        <img src="https://cdn-icons-png.flaticon.com/512/8649/8649603.png" alt="Bot" class="bot-avatar">
        <div class="bot-info">
            <h3>DialyBot 3.0</h3>
            <span class="status"><i class="fas fa-circle active-dot"></i> AI Assistant Online</span>
        </div>
        <i class="fas fa-chevron-down close-chat-icon"></i>
    </div>
    <div class="dialybot-body" id="chat-body">
        <div class="chat-message bot">
            <div class="msg-content">
                Hello! I am DialyBot 🤖, your AI Health & Diet Assistant. I can help you with personalized diet recommendations, risk alerts, and understanding your health data. How can I assist you today?
            </div>
        </div>
    </div>
    <div class="dialybot-footer">
        <input type="text" id="chat-input" placeholder="Ask about food, health, etc..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()" id="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<button id="dialybot-trigger" class="dialybot-trigger" onclick="toggleChat()">
    <i class="fas fa-robot"></i>
</button>

<style>
/* Modern Glassmorphism Chatbot UI */
.dialybot-container {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 360px;
    height: 550px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15), 0 5px 15px rgba(37, 99, 235, 0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: translateY(20px) scale(0.9);
    opacity: 0;
    pointer-events: none;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 10000;
}

.dialybot-container.active {
    transform: translateY(0) scale(1);
    opacity: 1;
    pointer-events: all;
}

.dialybot-header {
    background: linear-gradient(135deg, var(--primary, #2563eb), var(--secondary, #3b82f6));
    color: white;
    padding: 15px 20px;
    display: flex;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.bot-avatar {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: white;
    padding: 5px;
    margin-right: 15px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.bot-info h3 {
    margin: 0;
    font-size: 1.1rem;
    font-weight: 600;
}

.status {
    font-size: 0.8rem;
    opacity: 0.9;
    display: flex;
    align-items: center;
    gap: 5px;
}

.active-dot {
    color: #4ade80;
    font-size: 0.6rem;
    animation: blink 2s infinite;
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

.close-chat-icon {
    margin-left: auto;
    transition: transform 0.3s ease;
}

.dialybot-container.active .close-chat-icon {
    transform: rotate(180deg);
}

.dialybot-body {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
    background: #f8fafc;
}

/* Scrollbar styles */
.dialybot-body::-webkit-scrollbar { width: 6px; }
.dialybot-body::-webkit-scrollbar-track { background: transparent; }
.dialybot-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }

.chat-message {
    display: flex;
    flex-direction: column;
    max-width: 85%;
    animation: fadeIn 0.3s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.chat-message.user {
    align-self: flex-end;
}

.chat-message.bot {
    align-self: flex-start;
}

.msg-content {
    padding: 12px 16px;
    border-radius: 15px;
    font-size: 0.95rem;
    line-height: 1.4;
    word-wrap: break-word;
}

.user .msg-content {
    background: linear-gradient(135deg, var(--primary, #2563eb), #60a5fa);
    color: white;
    border-bottom-right-radius: 5px;
    box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
}

.bot .msg-content {
    background: white;
    color: #333;
    border-bottom-left-radius: 5px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    border: 1px solid rgba(0,0,0,0.05);
}

.dialybot-footer {
    padding: 15px;
    background: white;
    border-top: 1px solid rgba(0,0,0,0.05);
    display: flex;
    gap: 10px;
}

.dialybot-footer input {
    flex: 1;
    padding: 12px 20px;
    border: 1px solid #e2e8f0;
    border-radius: 25px;
    outline: none;
    font-size: 0.95rem;
    transition: all 0.3s ease;
}

.dialybot-footer input:focus {
    border-color: var(--primary, #2563eb);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

.dialybot-footer button {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: var(--primary, #2563eb);
    color: white;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
}

.dialybot-footer button:hover {
    transform: scale(1.05);
    background: var(--secondary, #1d4ed8);
}

.dialybot-trigger {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary, #2563eb), #60a5fa);
    color: white;
    font-size: 24px;
    border: none;
    box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
    cursor: pointer;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    animation: floatbot 3s ease-in-out infinite;
}

.dialybot-trigger:hover {
    transform: scale(1.1) translateY(-5px);
    box-shadow: 0 15px 35px rgba(37, 99, 235, 0.5);
}

@keyframes floatbot {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
}

.typing-indicator {
    display: flex;
    gap: 4px;
    padding: 15px !important;
    align-items: center;
    justify-content: center;
}

.typing-dot {
    width: 6px;
    height: 6px;
    background: #94a3b8;
    border-radius: 50%;
    animation: typing 1.4s infinite ease-in-out;
}

.typing-dot:nth-child(1) { animation-delay: 0s; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); background: var(--primary, #2563eb); }
}
</style>

<script>
function toggleChat() {
    const chat = document.getElementById('dialybot-container');
    chat.classList.toggle('active');
    if (chat.classList.contains('active')) {
        document.getElementById('chat-input').focus();
    }
}

function handleKeyPress(e) {
    if (e.key === 'Enter') {
        sendMessage();
    }
}

function appendMessage(sender, text, isHtml = false) {
    const chatBody = document.getElementById('chat-body');
    const msgDiv = document.createElement('div');
    msgDiv.className = `chat-message ${sender}`;
    
    let formattedText = text;
    if (!isHtml) {
        // Simple markdown parsing for bold and line breaks
        formattedText = text.replace(/\\*\\*(.*?)\\*\\*/g, '<strong>$1</strong>');
        formattedText = formattedText.replace(/\\n/g, '<br>');
    }
    
    msgDiv.innerHTML = `<div class="msg-content">${formattedText}</div>`;
    chatBody.appendChild(msgDiv);
    chatBody.scrollTop = chatBody.scrollHeight;
}

function showTyping() {
    const chatBody = document.getElementById('chat-body');
    const typingDiv = document.createElement('div');
    typingDiv.className = 'chat-message bot typing';
    typingDiv.id = 'typing-indicator';
    typingDiv.innerHTML = `
        <div class="msg-content typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
    `;
    chatBody.appendChild(typingDiv);
    chatBody.scrollTop = chatBody.scrollHeight;
}

function hideTyping() {
    const typingDiv = document.getElementById('typing-indicator');
    if (typingDiv) {
        typingDiv.remove();
    }
}

function sendMessage() {
    const input = document.getElementById('chat-input');
    const message = input.value.trim();
    if (!message) return;
    
    // Disable input while generating
    input.value = '';
    input.disabled = true;
    document.getElementById('send-btn').disabled = true;
    
    // Append user message
    appendMessage('user', message);
    
    // Show typing animation
    showTyping();
    
    // Connect to Flask Backend
    fetch('/chat', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ message: message })
    })
    .then(response => response.json())
    .then(data => {
        // Hide typing and append response
        hideTyping();
        appendMessage('bot', data.reply, true); // true for accepting HTML from server
        
        // Re-enable input
        input.disabled = false;
        document.getElementById('send-btn').disabled = false;
        input.focus();
    })
    .catch(error => {
        console.error('Error:', error);
        hideTyping();
        appendMessage('bot', '⚠️ Error connecting to server. Please try again.');
        input.disabled = false;
        document.getElementById('send-btn').disabled = false;
    });
}
</script>
