<!-- Clinical AI Floating Chat Widget -->
<div id="ClinicalAI-container" class="ClinicalAI-container glass-mini">
    <div class="ClinicalAI-header" onclick="toggleChat()">
        <div class="relative">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-robot"></i>
            </div>
            <div class="absolute -bottom-1 -right-1 w-3 h-3 bg-emerald-500 rounded-full border-2 border-slate-900 animate-pulse shadow-glow"></div>
        </div>
        <div class="bot-info ml-4">
            <h3 class="orbitron text-sm font-black text-white uppercase tracking-tight">Clinical AI</h3>
            <span class="status text-[10px] font-black uppercase text-blue-400/60 tracking-widest">v3.0 Secure Node</span>
        </div>
        <i class="fas fa-chevron-down ml-auto text-blue-400/40"></i>
    </div>
    
    <div class="ClinicalAI-body no-scrollbar" id="chat-body">
        <div class="chat-message bot">
            <div class="msg-content glass-bubble">
                Neural link established. I have access to your clinical telemetry. <br><br>
                <span class="text-blue-400">Initialize query...</span>
            </div>
        </div>
    </div>

    <div class="ClinicalAI-footer">
        <div class="relative w-full flex items-center">
            <input type="text" id="chat-input" placeholder="Neural command..." onkeypress="handleKeyPress(event)" class="w-full bg-white/5 border border-white/10 rounded-2xl py-3 px-5 text-sm font-bold text-white placeholder-white/20 outline-none focus:border-blue-500 transition-all">
            <button onclick="sendMessage()" id="send-btn" class="absolute right-2 w-8 h-8 bg-blue-600 text-white rounded-lg shadow-lg shadow-blue-600/20 active:scale-90 transition-all">
                <i class="fas fa-bolt text-xs"></i>
            </button>
        </div>
    </div>
</div>

<button id="ClinicalAI-trigger" class="ClinicalAI-trigger shadow-2xl" onclick="toggleChat()">
    <i class="fas fa-robot text-2xl"></i>
    <div class="absolute -top-1 -right-1 w-4 h-4 bg-emerald-500 rounded-full border-2 border-slate-900 animate-pulse shadow-glow"></div>
</button>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

:root {
    --bg-dark: #0f172a;
    --blue-glow: #3b82f6;
}

.orbitron { font-family: 'Orbitron', sans-serif; }

.shadow-glow { box-shadow: 0 0 10px #10b981; }

.ClinicalAI-container {
    position: fixed;
    bottom: 100px;
    right: 24px;
    width: 360px;
    height: 540px;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 32px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: translateY(40px) scale(0.95);
    opacity: 0;
    pointer-events: none;
    transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
    z-index: 10000;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
}

.ClinicalAI-container.active {
    transform: translateY(0) scale(1);
    opacity: 1;
    pointer-events: all;
}

.ClinicalAI-header {
    background: rgba(255, 255, 255, 0.02);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    cursor: pointer;
}

.ClinicalAI-body {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: radial-gradient(circle at bottom, rgba(59, 130, 246, 0.05), transparent);
}

.chat-message {
    display: flex;
    flex-direction: column;
    max-width: 85%;
    animation: slideUp 0.4s cubic-bezier(0.19, 1, 0.22, 1);
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

.msg-content {
    padding: 14px 18px;
    border-radius: 20px;
    font-size: 0.85rem;
    line-height: 1.6;
    font-weight: 600;
}

.user .msg-content {
    background: #2563eb;
    color: #fff;
    border-top-right-radius: 4px;
    box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
}

.bot .msg-content {
    background: rgba(255, 255, 255, 0.03);
    color: #e2e8f0;
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-top-left-radius: 4px;
    backdrop-blur: 10px;
}

.ClinicalAI-footer {
    padding: 20px;
    background: rgba(15, 23, 42, 0.5);
    border-top: 1px solid rgba(255, 255, 255, 0.05);
}

.ClinicalAI-trigger {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 64px;
    height: 64px;
    border-radius: 24px;
    background: #2563eb;
    color: white;
    border: none;
    box-shadow: 0 10px 30px rgba(37, 99, 235, 0.4);
    cursor: pointer;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.ClinicalAI-trigger:hover {
    transform: translateY(-5px) scale(1.1);
    background: #3b82f6;
}

.no-scrollbar::-webkit-scrollbar { display: none; }

.typing-dot {
    width: 4px; height: 4px; background: #60a5fa; border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out;
}
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
</style>

<script>
function toggleChat() {
    const chat = document.getElementById('ClinicalAI-container');
    chat.classList.toggle('active');
}

function handleKeyPress(e) {
    if (e.key === 'Enter') { sendMessage(); }
}

function appendMessage(sender, text) {
    const chatBody = document.getElementById('chat-body');
    const msgDiv = document.createElement('div');
    msgDiv.className = `chat-message ${sender}`;
    let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong class="text-blue-400 font-black">$1</strong>').replace(/\n/g, '<br>');
    msgDiv.innerHTML = `<div class="msg-content">${formattedText}</div>`;
    chatBody.appendChild(msgDiv);
    chatBody.scrollTop = chatBody.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById('chat-input');
    const message = input.value.trim();
    if (!message) return;
    
    input.value = '';
    appendMessage('user', message);
    
    // Typing indicator
    const typingRoot = document.createElement('div');
    typingRoot.className = 'chat-message bot flex gap-2 p-2 items-center';
    typingRoot.id = 'typing';
    typingRoot.innerHTML = '<div class="typing-dot" style="animation-delay: 0s"></div><div class="typing-dot" style="animation-delay: 0.2s"></div><div class="typing-dot" style="animation-delay: 0.4s"></div>';
    document.getElementById('chat-body').appendChild(typingRoot);
    
    fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ message: message })
    })
    .then(r => r.json())
    .then(data => {
        document.getElementById('typing').remove();
        appendMessage('bot', data.reply);
    })
    .catch(() => {
        document.getElementById('typing').remove();
        appendMessage('bot', '❌ Neural tunnel blocked.');
    });
}
</script>
