<!-- NephroBot Floating Chat Widget -->
<div id="NephroBot-container" class="NephroBot-container">
    <div class="NephroBot-header" onclick="toggleChat()">
        <img src="https://cdn-icons-png.flaticon.com/512/8649/8649603.png" alt="Bot" class="bot-avatar">
        <div class="bot-info">
            <h3>NephroBot 3.0</h3>
            <span class="status"><i class="fas fa-circle active-dot"></i> AI Assistant Online</span>
        </div>
        <i class="fas fa-chevron-down close-chat-icon"></i>
    </div>
    <div class="NephroBot-body" id="chat-body">
        <div class="chat-message bot">
            <div class="msg-content">
                Hello! I am NephroBot 🤖, your AI Health & Diet Assistant. I can help you with personalized diet recommendations, risk alerts, and understanding your health data. How can I assist you today?
            </div>
        </div>
    </div>
    <div class="NephroBot-footer">
        <input type="text" id="chat-input" placeholder="Ask about food, health, etc..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()" id="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<button id="NephroBot-trigger" class="NephroBot-trigger" onclick="toggleChat()">
    <i class="fas fa-robot"></i>
</button>

<style>
/* Professional Blue & White Chatbot UI */
:root {
    --bot-bg: rgba(255, 255, 255, 0.9);
    --bot-accent: #2563eb;
    --bot-secondary: #1e3a8a;
}

.NephroBot-container {
    position: fixed;
    bottom: 100px;
    right: 24px;
    width: 380px;
    height: 600px;
    background: var(--bot-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(37, 99, 235, 0.1);
    border-radius: 32px;
    box-shadow: 0 10px 40px rgba(30, 64, 175, 0.1), 0 0 20px rgba(37, 99, 235, 0.05);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: translateY(40px) scale(0.95);
    opacity: 0;
    pointer-events: none;
    transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
    z-index: 10000;
}

.NephroBot-container.active {
    transform: translateY(0) scale(1);
    opacity: 1;
    pointer-events: all;
}

.NephroBot-header {
    background: linear-gradient(135deg, rgba(37, 99, 235, 0.05), rgba(30, 64, 175, 0.05));
    border-bottom: 1px solid rgba(37, 99, 235, 0.1);
    color: var(--bot-secondary);
    padding: 24px;
    display: flex;
    align-items: center;
    cursor: pointer;
}

.bot-avatar {
    width: 48px;
    height: 48px;
    border-radius: 16px;
    background: linear-gradient(135deg, #2563eb, #1e40af);
    padding: 10px;
    margin-right: 16px;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
}

.bot-info h3 {
    margin: 0;
    font-size: 1.15rem;
    font-weight: 800;
    color: #1e3a8a;
    letter-spacing: -0.5px;
}

.status {
    font-size: 0.75rem;
    font-weight: 600;
    color: #64748b;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
}

.active-dot {
    color: #10b981;
    font-size: 0.5rem;
    animation: glowPulse 2s infinite;
}

@keyframes glowPulse {
    0% { opacity: 1; text-shadow: 0 0 5px #10b981; }
    50% { opacity: 0.5; text-shadow: 0 0 0px #10b981; }
    100% { opacity: 1; text-shadow: 0 0 5px #10b981; }
}

.NephroBot-body {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: rgba(248, 250, 252, 0.5);
}

.chat-message {
    display: flex;
    flex-direction: column;
    max-width: 85%;
    animation: slideUp 0.4s cubic-bezier(0.19, 1, 0.22, 1);
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

.msg-content {
    padding: 14px 18px;
    border-radius: 20px;
    font-size: 0.85rem;
    line-height: 1.6;
    font-weight: 600;
}

.user .msg-content {
    background: #2563eb;
    color: #fff;
    border-top-right-radius: 4px;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
}

.bot .msg-content {
    background: #fff;
    color: #1e3a8a;
    border: 1px solid #e2e8f0;
    border-top-left-radius: 4px;
    box-shadow: 0 4px 12px rgba(30, 64, 175, 0.05);
}

.NephroBot-footer {
    padding: 20px 24px;
    background: #fff;
    border-top: 1px solid #f1f5f9;
    display: flex;
    gap: 12px;
}

.NephroBot-footer input {
    flex: 1;
    padding: 12px 20px;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    color: #1e3a8a;
    outline: none;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.3s ease;
}

.NephroBot-footer input:focus {
    background: #fff;
    border-color: #2563eb;
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
}

.NephroBot-footer button {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    background: linear-gradient(135deg, #2563eb, #1e40af);
    color: white;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
}

.NephroBot-footer button:hover {
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
}

.NephroBot-trigger {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 64px;
    height: 64px;
    border-radius: 20px;
    background: linear-gradient(135deg, #2563eb, #1e40af);
    color: white;
    font-size: 26px;
    border: none;
    box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
    cursor: pointer;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.NephroBot-trigger:hover {
    transform: translateY(-5px) scale(1.05) rotate(-5deg);
    box-shadow: 0 15px 35px rgba(37, 99, 235, 0.4);
}

.typing-indicator {
    display: flex;
    gap: 6px;
    padding: 12px 18px !important;
}

.typing-dot {
    width: 5px;
    height: 5px;
    background: #06b6d4;
    border-radius: 50%;
    animation: jump 1.4s infinite ease-in-out;
}

@keyframes jump {
    0%, 100% { transform: translateY(0); opacity: 0.3; }
    50% { transform: translateY(-6px); opacity: 1; }
}
</style>

<script>
function toggleChat() {
    const chat = document.getElementById('NephroBot-container');
    chat.classList.toggle('active');
    if (chat.classList.contains('active')) {
        document.getElementById('chat-input').focus();
    }
}

function handleKeyPress(e) {
    if (e.key === 'Enter') {
        sendMessage();
    }
}

function appendMessage(sender, text, isHtml = false) {
    const chatBody = document.getElementById('chat-body');
    const msgDiv = document.createElement('div');
    msgDiv.className = `chat-message ${sender}`;
    
    let formattedText = text;
    if (!isHtml) {
        // Simple markdown parsing for bold and line breaks
        formattedText = text.replace(/\\*\\*(.*?)\\*\\*/g, '<strong>$1</strong>');
        formattedText = formattedText.replace(/\\n/g, '<br>');
    }
    
    msgDiv.innerHTML = `<div class="msg-content">${formattedText}</div>`;
    chatBody.appendChild(msgDiv);
    chatBody.scrollTop = chatBody.scrollHeight;
}

function showTyping() {
    const chatBody = document.getElementById('chat-body');
    const typingDiv = document.createElement('div');
    typingDiv.className = 'chat-message bot typing';
    typingDiv.id = 'typing-indicator';
    typingDiv.innerHTML = `
        <div class="msg-content typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
    `;
    chatBody.appendChild(typingDiv);
    chatBody.scrollTop = chatBody.scrollHeight;
}

function hideTyping() {
    const typingDiv = document.getElementById('typing-indicator');
    if (typingDiv) {
        typingDiv.remove();
    }
}

function sendMessage() {
    const input = document.getElementById('chat-input');
    const message = input.value.trim();
    if (!message) return;
    
    // Disable input while generating
    input.value = '';
    input.disabled = true;
    document.getElementById('send-btn').disabled = true;
    
    // Append user message
    appendMessage('user', message);
    
    // Show typing animation
    showTyping();
    
    // Connect to Flask Backend
    fetch('/chat', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ message: message })
    })
    .then(response => response.json())
    .then(data => {
        // Hide typing and append response
        hideTyping();
        appendMessage('bot', data.reply, true); // true for accepting HTML from server
        
        // Re-enable input
        input.disabled = false;
        document.getElementById('send-btn').disabled = false;
        input.focus();
    })
    .catch(error => {
        console.error('Error:', error);
        hideTyping();
        appendMessage('bot', '⚠️ Error connecting to server. Please try again.');
        input.disabled = false;
        document.getElementById('send-btn').disabled = false;
    });
}
</script>
