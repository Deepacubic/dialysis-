<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Vitals — NephroAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-light: #f8fafc;
            --blue-primary: #2563eb;
            --blue-secondary: #1e40af;
            --glass-white: rgba(255, 255, 255, 0.85);
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-light);
            color: #1e3a8a;
        }
        .glass { 
            background: var(--glass-white); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(37, 99, 235, 0.1);
        }
        input, select {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus, select:focus {
            transform: scale(1.01);
            border-color: #2563eb !important;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.05) !important;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navbar -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-blue-500/10 mx-6 mt-6 rounded-[24px]">
        <div class="max-w-7xl mx-auto px-8 py-5 flex justify-between items-center">
            <a href="/" class="text-2xl font-black text-blue-900 flex items-center gap-2 tracking-tighter">
                <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-500/20 text-white">
                    <i class="fas fa-file-medical"></i>
                </div>
                Log<span class="text-blue-600">Vitals</span>
            </a>
            <div class="flex items-center gap-8 font-bold text-sm text-blue-900/60 uppercase tracking-widest">
                <a href="/dashboard" class="hover:text-blue-600 transition-all">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <main class="pt-48 pb-24 px-8 max-w-5xl mx-auto">
        <header class="mb-12">
            <h1 class="text-5xl font-black text-blue-900 tracking-tighter mb-4">Clinical Telemetry</h1>
            <p class="text-blue-500/60 font-bold text-lg max-w-xl leading-relaxed italic">
                Enter your biometric data and laboratory biochemistry for AI-driven risk scoring.
            </p>
        </header>

        <form action="/health-entry" method="POST" class="glass p-12 rounded-[48px] border border-blue-100 shadow-2xl shadow-blue-500/5 space-y-12">
            
            <!-- Biometrics -->
            <section class="space-y-8">
                <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-blue-400 border-b border-blue-100 pb-3">Primary Biometrics</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="space-y-3">
                        <label class="text-[11px] font-black text-blue-900 uppercase tracking-widest ml-1">Potassium (mEq/L)</label>
                        <input type="number" step="0.1" name="potassium" placeholder="4.2" required
                               class="w-full p-5 glass rounded-2xl border border-blue-100 font-bold text-blue-900 outline-none">
                    </div>
                    <div class="space-y-3">
                        <label class="text-[11px] font-black text-blue-900 uppercase tracking-widest ml-1">Sodium (mEq/L)</label>
                        <input type="number" step="0.1" name="sodium" placeholder="138" required
                               class="w-full p-5 glass rounded-2xl border border-blue-100 font-bold text-blue-900 outline-none">
                    </div>
                    <div class="space-y-3">
                        <label class="text-[11px] font-black text-blue-900 uppercase tracking-widest ml-1">Fluid Intake (ml)</label>
                        <input type="number" name="fluid" placeholder="1200" required
                               class="w-full p-5 glass rounded-2xl border border-blue-100 font-bold text-blue-600 outline-none">
                    </div>
                </div>
            </section>

            <!-- Lab Biochemistry -->
            <section class="space-y-8">
                <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-indigo-400 border-b border-indigo-100 pb-3">Laboratory Biochemistry</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-3">
                        <label class="text-[11px] font-black text-indigo-900 uppercase tracking-widest ml-1">Creatinine (mg/dL)</label>
                        <input type="number" step="0.1" name="creatinine" placeholder="1.2" required
                               class="w-full p-5 bg-indigo-50/50 rounded-2xl border border-indigo-100 font-black text-indigo-800 outline-none">
                    </div>
                    <div class="space-y-3">
                        <label class="text-[11px] font-black text-blue-900 uppercase tracking-widest ml-1">Hemoglobin (g/dL)</label>
                        <input type="number" step="0.1" name="hgb" placeholder="11.5" required
                               class="w-full p-5 glass rounded-2xl border border-blue-100 font-bold text-rose-600 outline-none">
                    </div>
                    <div class="space-y-3">
                        <label class="text-[11px] font-black text-blue-900 uppercase tracking-widest ml-1">Weight (kg)</label>
                        <input type="number" step="0.1" name="weight" placeholder="70.0" required
                               class="w-full p-5 glass rounded-2xl border border-blue-100 font-bold text-blue-900 outline-none">
                    </div>
                    <div class="space-y-3">
                        <label class="text-[11px] font-black text-blue-900 uppercase tracking-widest ml-1">Blood Pressure (SYS/DIA)</label>
                        <div class="flex gap-3">
                            <input type="number" name="bp_sys" placeholder="120" required class="flex-1 p-5 glass rounded-2xl border border-blue-100 font-bold text-center outline-none">
                            <input type="number" name="bp_dia" placeholder="80" required class="flex-1 p-5 glass rounded-2xl border border-blue-100 font-bold text-center outline-none">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                     <div class="space-y-3">
                        <label class="text-[11px] font-black text-blue-900 uppercase tracking-widest ml-1">Blood Sugar (mg/dL)</label>
                        <input type="number" step="0.1" name="sugar" placeholder="105" required
                               class="w-full p-5 glass rounded-2xl border border-blue-100 font-bold text-blue-900 outline-none">
                    </div>
                    <div class="space-y-3">
                        <label class="text-[11px] font-black text-blue-900 uppercase tracking-widest ml-1">HCV Diagnostic Status</label>
                        <select name="hcv_status" class="w-full p-5 glass rounded-2xl border border-blue-100 font-bold text-blue-900 outline-none appearance-none">
                            <option value="Negative">NEGATIVE (NON-REACTIVE)</option>
                            <option value="Positive">POSITIVE (REACTIVE)</option>
                        </select>
                    </div>
                </div>

                <!-- Urea Addition as requested by original form -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                   <div class="space-y-3">
                        <label class="text-[11px] font-black text-blue-900 uppercase tracking-widest ml-1">BUN / Urea (mg/dL)</label>
                        <input type="number" step="0.1" name="urea" placeholder="42.0" required
                               class="w-full p-5 glass rounded-2xl border border-blue-100 font-bold text-blue-900 outline-none">
                    </div>
                </div>
                
                <input type="hidden" name="platelets" value="250">
                <input type="hidden" name="chloride" value="102">
                <input type="hidden" name="cholesterol" value="180">
                <input type="hidden" name="iron" value="85">
                <input type="hidden" name="calcium" value="9.2">
                <input type="hidden" name="bilirubin" value="0.8">
                <input type="hidden" name="wbc" value="7.2">
                <input type="hidden" name="rbc" value="4.5">
            </section>

            <button type="submit" class="w-full p-6 bg-gradient-to-r from-blue-600 to-indigo-700 text-white font-black rounded-3xl tracking-widest uppercase text-lg shadow-2xl shadow-blue-500/20 hover:scale-[1.01] transition-all">
                Synchronize & Analyze <i class="fas fa-microchip ml-2"></i>
            </button>
        </form>

        <footer class="mt-16 text-center">
            <p class="text-[10px] font-black text-blue-200 uppercase tracking-[0.4em]">Integrated Clinical Stream • NephroAI V2.0</p>
        </footer>
    </main>

    {% include 'chatbot.html' %}
</body>
</html>
