<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Health Data - DialyCare AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .dashboard-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: var(--secondary);
            color: white;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            transition: var(--transition);
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .main-content {
            padding: 3rem;
            background: #f1f5f9;
        }

        .form-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(0, 0, 0, 0.05);
            max-width: 800px;
            margin: 0 auto;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid #e2e8f0;
            font-size: 1rem;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo" style="color: white; font-size: 1.2rem;"><i class="fas fa-heartbeat"></i> DialyCare AI
            </div>
            <nav class="sidebar-nav" style="display: flex; flex-direction: column; gap: 1rem;">
                <a href="/dashboard" class="sidebar-link"><i class="fas fa-th-large"></i> {{ _('dashboard') }}</a>
                <a href="/health-entry" class="sidebar-link active"><i class="fas fa-plus-circle"></i> {{
                    _('health_entry') }}</a>
                <a href="/food" class="sidebar-link"><i class="fas fa-utensils"></i> {{ _('diet_plan') }}</a>
                <a href="/logout" class="sidebar-link" style="color: var(--error); margin-top: 2rem;"><i
                        class="fas fa-sign-out-alt"></i> {{ _('logout') }}</a>
            </nav>
        </aside>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h1 style="font-size: 1.75rem; font-weight: 800;">{{ _('health_entry') }}</h1>
                </div>
                <div class="lang-selector">
                    <i class="fas fa-globe"></i>
                    <select onchange="window.location.href='/set-language/'+this.value">
                        <option value="en" {% if current_lang=='en' %}selected{% endif %}>English</option>
                        <option value="ta" {% if current_lang=='ta' %}selected{% endif %}>தமிழ்</option>
                        <option value="hi" {% if current_lang=='hi' %}selected{% endif %}>हिंदी</option>
                        <option value="ko" {% if current_lang=='ko' %}selected{% endif %}>한국어</option>
                        <option value="ja" {% if current_lang=='ja' %}selected{% endif %}>日本語</option>
                        <option value="zh" {% if current_lang=='zh' %}selected{% endif %}>简体中文</option>
                    </select>
                </div>
            </header>

            <div class="form-card">
                <h2 style="margin-bottom: 0.5rem; font-weight: 800;">{{ _('log_today_data') }}</h2>
                <p style="color: var(--text-muted); margin-bottom: 2rem;">{{ _('enter_clinical_params') }}</p>

                <form action="/health-entry" method="POST">
                    <h3
                        style="margin: 2rem 0 1rem; color: var(--primary); font-size: 1.1rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem;">
                        {{ _('basic_vitals') }}</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>{{ _('potassium') }} (mg/dL)</label>
                            <input type="number" step="0.1" name="potassium" class="form-control" placeholder="4.5"
                                required>
                        </div>
                        <div class="form-group">
                            <label>{{ _('sodium') }} (mEq/L)</label>
                            <input type="number" step="0.1" name="sodium" class="form-control" placeholder="140"
                                required>
                        </div>
                        <div class="form-group">
                            <label>{{ _('fluid') }} (ml)</label>
                            <input type="number" name="fluid" class="form-control" placeholder="1000" required>
                        </div>
                        <div class="form-group">
                            <label>{{ _('weight') }} (kg)</label>
                            <input type="number" step="0.1" name="weight" class="form-control" placeholder="70"
                                required>
                        </div>
                        <div class="form-group">
                            <label>{{ _('blood_pressure') }} ({{ _('sys') }} / {{ _('dia') }})</label>
                            <div style="display: flex; gap: 0.5rem;">
                                <input type="number" name="bp_sys" class="form-control" placeholder="120" required>
                                <input type="number" name="bp_dia" class="form-control" placeholder="80" required>
                            </div>
                        </div>
                    </div>

                    <h3
                        style="margin: 2rem 0 1rem; color: var(--primary); font-size: 1.1rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem;">
                        {{ _('biochem_lab') }}</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Urea (mg/dL)</label>
                            <input type="number" step="0.1" name="urea" class="form-control" placeholder="40" required>
                        </div>
                        <div class="form-group">
                            <label>{{ _('creatinine') }} (mg/dL)</label>
                            <input type="number" step="0.1" name="creatinine" class="form-control" placeholder="1.2"
                                required>
                        </div>
                        <div class="form-group">
                            <label>{{ _('chloride') }} (mEq/L)</label>
                            <input type="number" step="0.1" name="chloride" class="form-control" placeholder="100"
                                required>
                        </div>
                        <div class="form-group">
                            <label>{{ _('sugar') }} (mg/dL)</label>
                            <input type="number" step="0.1" name="sugar" class="form-control" placeholder="100"
                                required>
                        </div>
                        <div class="form-group">
                            <label>{{ _('cholesterol') }} (mg/dL)</label>
                            <input type="number" step="0.1" name="cholesterol" class="form-control" placeholder="200"
                                required>
                        </div>
                        <div class="form-group">
                            <label>{{ _('calcium') }} (mg/dL)</label>
                            <input type="number" step="0.1" name="calcium" class="form-control" placeholder="9.5"
                                required>
                        </div>
                        <div class="form-group">
                            <label>{{ _('iron') }} (mcg/dL)</label>
                            <input type="number" step="0.1" name="iron" class="form-control" placeholder="100" required>
                        </div>
                        <div class="form-group">
                            <label>{{ _('bilirubin') }} (mg/dL)</label>
                            <input type="number" step="0.1" name="bilirubin" class="form-control" placeholder="1.0"
                                required>
                        </div>
                        <div class="form-group">
                            <label>{{ _('hcv_status') }}</label>
                            <select name="hcv_status" class="form-control">
                                <option value="Negative">Negative</option>
                                <option value="Positive">Positive</option>
                            </select>
                        </div>
                    </div>

                    <h3
                        style="margin: 2rem 0 1rem; color: var(--primary); font-size: 1.1rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem;">
                        {{ _('cbc_count') }}</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>{{ _('wbc') }} (x10³/µL)</label>
                            <input type="number" step="0.1" name="wbc" class="form-control" placeholder="4.5" required>
                        </div>
                        <div class="form-group">
                            <label>{{ _('rbc') }} (x10⁶/µL)</label>
                            <input type="number" step="0.1" name="rbc" class="form-control" placeholder="4.7" required>
                        </div>
                        <div class="form-group">
                            <label>{{ _('hgb') }} (g/dL)</label>
                            <input type="number" step="0.1" name="hgb" class="form-control" placeholder="14" required>
                        </div>
                        <div class="form-group">
                            <label>{{ _('platelets') }} (x10³/µL)</label>
                            <input type="number" step="0.1" name="platelets" class="form-control" placeholder="150"
                                required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary"
                        style="width: 100%; margin-top: 3rem; padding: 1.25rem; font-size: 1.1rem; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);">{{
                        _('clinical_report') }}</button>
                </form>
            </div>
        </main>
    </div>
</body>

</html>
